# ============================================================================
# tracker.yaml — the SINGLE source of truth for this tracker's file identity.
#
# This is the one place that says *which* EU file this repo follows. Everything
# else (CLAUDE.md, README.md, STATUS.md, the skills' scope checks) reads from
# here or is filled from here by `python3 bootstrap.py`.
#
# This tracker follows file 2026/0138 (COD) — the Cloud and AI Development Act
# (CADA), part of the European Technological Sovereignty Package (3 June 2026).
# ============================================================================

# --- Identity ---------------------------------------------------------------
file_id: "2026/0138 (COD)"                # interinstitutional file number + procedure type
short_name: "Cloud and AI Development Act (CADA)"
strand: "EU Cloud Sovereignty Framework (four assurance levels), data-centre capacity tripling, cloud/AI strategic projects and acceleration zones, public-sector cloud procurement, open-source-first (Art 41)"

proposal:
  id: "COM(2026) 502"                     # Commission proposal id (without "final")
  date: "2026-06-03"                      # ISO
  swd: "SWD(2026) 502"                    # accompanying impact assessment (Part 1/2 + summary)
  celex: "https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:52026PC0502"
  oeil: "https://oeil.europarl.europa.eu/oeil/en/procedure-file?reference=2026/0138(COD)"

# Sibling file(s) that are easy to confuse with this one and must NOT be tracked
# here. Drives the scope-guard text in CLAUDE.md/README and the skills' scope rule.
keep_apart:
  - file_id: "2026/0139 (COD)"
    note: "Chips Act 2.0 (COM(2026) 504, repealing Regulation (EU) 2023/1781) — the other legislative half of the same Tech Sovereignty Package"
# The package's two NON-legislative parts (EU Open Source Strategy; Strategic
# Roadmap for Digitalisation and AI in Energy) are tracked here only where they
# touch CADA (e.g. the open-source-first principle anchored in CADA Art 41).

legal_bases: ["Article 114 TFEU", "Article 173(3) TFEU"]   # per the citations of COM(2026) 502

# Existing laws this file amends/repeals. Drives docs/instruments/ pages.
# CADA is a STANDALONE regulation: a text search of COM(2026) 502 finds no
# "is amended"/"repealed" provisions. The instruments below are REFERENCED
# (interfaces), not amended — confirm once more when transcribing Title V.
instruments:
  - { name: "Data Act", celex: "2023/2854" }
  - { name: "NIS2 Directive", celex: "2022/2555" }
  - { name: "DORA", celex: "2022/2554" }
  - { name: "GDPR", celex: "2016/679" }
  - { name: "AI Act", celex: "2024/1689" }
  - { name: "Cybersecurity Act", celex: "2019/881" }

# The per-version operative-text file set under extracts/. EACH compromise
# version gets one file per slice, named ST-<nnnn>-<yyyy>_<slice>.md, so
# `git diff` between versions lines up.
# Confirmed against the operative text (transcribed in extracts/commission/).
# Note: open source is Title IV Chapter V in the operative text (the memorandum
# mislabels it Ch VI); Title V's delegation article is misprinted "Article 44"
# (anchor article-44-bis in the extracts).
extract_slices:
  - general-provisions-art1-2        # Title I — subject matter, definitions
  - leadership-initiatives-art3-9    # Title II — Cloud and AI Leadership Initiatives, frontier AI priority projects
  - data-centres-art10-15            # Title III — acceleration zones, strategic projects, capacity monitoring
  - sovereignty-framework-art16-28   # Title IV ch I — Union assurance levels 1-4, recognition, audits, NCAs
  - public-sector-use-art29-33       # Title IV ch II — risk assessments, procurement obligations, NIS2-sector impact assessments
  - eurocloud-federation-art34-36    # Title IV ch III
  - common-procurement-art37-40      # Title IV ch IV — Commission common procurement framework
  - open-source-art41-44             # Title IV ch V — open-source preference, sharing/reuse, catalogue, OSPO network
  - final-provisions-art45-48        # Title V — delegated/implementing acts, review, entry into force
  - recitals

# OLP actor skeleton for STATUS.md "Where each institution stands".
co_legislators:
  council:
    config: "Telecom Working Party (verify against ST 10104/26 cover note routing: TELECOM/CYBER/MI/COMPET/CODEC)"
  parliament:
    committees_responsible: []            # not yet appointed; ITRE expected (verify)
    committees_opinion: []

# Advisory bodies that must be / have been consulted (drives the STATUS advisory table).
advisory_bodies: ["EESC", "CoR"]

# ============================================================================
