# Document register — the SINGLE source of truth for every official document on the file.
# sources/README.md is its *rendered* table (edit this YAML, then mirror the table; never the table alone).
#
# Field reference:
#   id            stable institutional id (COM-…, ST-…, WK-…, CM-…, OEIL-…, EESC-…)
#   title         quoted descriptive title
#   body          institution: Commission | Council | Parliament | EESC | CoR | <Member State> | …
#   date          ISO YYYY-MM-DD
#   limite        bool — true for Council LIMITE documents
#   url           authoritative URL (also: celex)
#   mirror        public copy when the authoritative URL is restricted (LIMITE)
#   register      Council register reference
#   national_parliament  national-parliament record hosting a LIMITE text
#   local / local_cover / local_annex / local_init / local_add1…  committed file path(s)
#   access        omit = fully public; else cite-only | screenshot-only | not-public |
#                 public-released | public-via-register | public-via-journalist | public-via-national-parliament
#   leading_service / mandatory_consultees / notes   prose context (notes is a `>-` block)

documents:
  - id: COM-2026-502
    title: "Cloud and AI Development Act (CADA) — proposal for a Regulation establishing a framework of measures for strengthening Europe's cloud and AI ecosystem"
    body: Commission
    date: 2026-06-03
    limite: false
    url: https://digital-strategy.ec.europa.eu/en/library/proposal-cloud-and-ai-development-act-cada
    celex: https://eur-lex.europa.eu/legal-content/EN/TXT/?uri=CELEX:52026PC0502
    local: sources/commission/COM-2026-502_proposal_2026-06-03.pdf
    local_annex: sources/commission/COM-2026-502_annexes-1-3_2026-06-03.pdf
    leading_service: "Lead service DG CNECT; political leads President von der Leyen and EVP Virkkunen (Tech Sovereignty, Security and Democracy)."
    mandatory_consultees: European Economic and Social Committee, European Committee of the Regions
    notes: >-
      The proposal this repo tracks — the legislative core of the European Technological
      Sovereignty Package (presented 3 June 2026 together with Chips Act 2.0, the EU Open Source
      Strategy and the Strategic Roadmap for Digitalisation and AI in Energy). 48 articles in five
      Titles; legal bases Art 114 + 173(3) TFEU; Text with EEA relevance. Standalone regulation —
      amends/repeals nothing. Accompanied by SWD(2026) 502 (impact assessment, 2 parts) and
      SWD(2026) 503 (executive summary). Annexes 1–3 committed separately.

