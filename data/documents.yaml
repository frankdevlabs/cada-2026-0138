    notes: >-
      Dated The Hague, 17 April 2026; tabled around the informal Telecom Council of 20 April 2026
      (Kamerstuk series 21501-33; Tweede Kamer document 2026D18815). Argues for organising the
      package around a "Sovereign Tech Stack" with a demand–supply loop across the stack layers and
      open source as cross-cutting enabler; explicitly supports earlier DE and DK non-papers on CADA.
